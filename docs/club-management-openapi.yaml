openapi: 3.0.3
info:
  title: Club Management System API
  version: 1.0.0
  description: |
    社团管理系统 OpenAPI 文档，覆盖认证、用户、社团、部门、岗位、招新、申请、审核、面试、成员、退社、RBAC、通知与日志模块。
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Users
  - name: Clubs
  - name: Departments
  - name: Positions
  - name: Recruitment Campaigns
  - name: Applications
  - name: Approvals
  - name: Interviews
  - name: Memberships
  - name: Exit Applications
  - name: Roles
  - name: Permissions
  - name: Notifications
  - name: Logs
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: 刷新 token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户信息
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CurrentUserResponse'
  /users:
    get:
      tags: [Users]
      summary: 查询用户列表
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: clubId
          in: query
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PageData'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: 后台创建用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /users/{userId}:
    get:
      tags: [Users]
      summary: 获取用户详情
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
    patch:
      tags: [Users]
      summary: 更新用户信息
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /users/{userId}/status:
    patch:
      tags: [Users]
      summary: 更新用户状态
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /users/{userId}/reset-password:
    post:
      tags: [Users]
      summary: 重置用户密码
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /users/{userId}/memberships:
    get:
      tags: [Users]
      summary: 获取用户社团关系
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Membership'
  /clubs:
    get:
      tags: [Clubs]
      summary: 查询社团列表
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ClubStatus'
        - name: recruitmentStatus
          in: query
          schema:
            $ref: '#/components/schemas/RecruitmentStatus'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Club'
    post:
      tags: [Clubs]
      summary: 创建社团
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}:
    get:
      tags: [Clubs]
      summary: 获取社团详情
      parameters:
        - $ref: '#/components/parameters/ClubId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Club'
    patch:
      tags: [Clubs]
      summary: 更新社团
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClubRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}/status:
    patch:
      tags: [Clubs]
      summary: 更新社团状态
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/ClubStatus'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}/recruitment-status:
    patch:
      tags: [Clubs]
      summary: 更新社团招新状态
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recruitmentStatus]
              properties:
                recruitmentStatus:
                  $ref: '#/components/schemas/RecruitmentStatus'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}/departments:
    get:
      tags: [Departments]
      summary: 查询社团部门列表
      parameters:
        - $ref: '#/components/parameters/ClubId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Department'
    post:
      tags: [Departments]
      summary: 创建部门
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /departments/{departmentId}:
    get:
      tags: [Departments]
      summary: 获取部门详情
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Department'
    patch:
      tags: [Departments]
      summary: 更新部门
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Departments]
      summary: 删除部门
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}/positions:
    get:
      tags: [Positions]
      summary: 查询岗位列表
      parameters:
        - $ref: '#/components/parameters/ClubId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Position'
    post:
      tags: [Positions]
      summary: 创建岗位
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePositionRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /positions/{positionId}:
    get:
      tags: [Positions]
      summary: 获取岗位详情
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Position'
    patch:
      tags: [Positions]
      summary: 更新岗位
      parameters:
        - $ref: '#/components/parameters/PositionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePositionRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Positions]
      summary: 删除岗位
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /clubs/{clubId}/recruitment-campaigns:
    get:
      tags: [Recruitment Campaigns]
      summary: 查询招新计划列表
      parameters:
        - $ref: '#/components/parameters/ClubId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecruitmentCampaign'
    post:
      tags: [Recruitment Campaigns]
      summary: 创建招新计划
      parameters:
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecruitmentCampaignRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /recruitment-campaigns/{campaignId}:
    get:
      tags: [Recruitment Campaigns]
      summary: 获取招新计划详情
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecruitmentCampaign'
    patch:
      tags: [Recruitment Campaigns]
      summary: 更新招新计划
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecruitmentCampaignRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /recruitment-campaigns/{campaignId}/publish:
    post:
      tags: [Recruitment Campaigns]
      summary: 发布招新计划
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /recruitment-campaigns/{campaignId}/close:
    post:
      tags: [Recruitment Campaigns]
      summary: 关闭招新计划
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications:
    get:
      tags: [Applications]
      summary: 查询申请列表
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
            format: int64
        - name: clubId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
        - name: departmentId
          in: query
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PageData'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Application'
    post:
      tags: [Applications]
      summary: 提交入会申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/{applicationId}:
    get:
      tags: [Applications]
      summary: 获取申请详情
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Application'
    patch:
      tags: [Applications]
      summary: 修改申请
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/{applicationId}/submit:
    post:
      tags: [Applications]
      summary: 提交草稿申请
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/{applicationId}/withdraw:
    post:
      tags: [Applications]
      summary: 撤回申请
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/{applicationId}/approval-records:
    get:
      tags: [Approvals]
      summary: 查询审批记录
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApprovalRecord'
  /applications/{applicationId}/approvals:
    post:
      tags: [Approvals]
      summary: 执行审批动作
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/batch-approvals:
    post:
      tags: [Approvals]
      summary: 批量审批
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchApprovalRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /interviews:
    get:
      tags: [Interviews]
      summary: 查询面试列表
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
            format: int64
        - name: applicationId
          in: query
          schema:
            type: integer
            format: int64
        - name: interviewerId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InterviewStatus'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Interview'
    post:
      tags: [Interviews]
      summary: 创建面试安排
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterviewRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /interviews/{interviewId}:
    get:
      tags: [Interviews]
      summary: 获取面试详情
      parameters:
        - $ref: '#/components/parameters/InterviewId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Interview'
    patch:
      tags: [Interviews]
      summary: 更新面试安排
      parameters:
        - $ref: '#/components/parameters/InterviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInterviewRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /interviews/{interviewId}/confirm:
    post:
      tags: [Interviews]
      summary: 候选人确认面试
      parameters:
        - $ref: '#/components/parameters/InterviewId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /interviews/{interviewId}/feedback:
    post:
      tags: [Interviews]
      summary: 提交面试反馈
      parameters:
        - $ref: '#/components/parameters/InterviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterviewFeedbackRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /interviews/{interviewId}/complete:
    post:
      tags: [Interviews]
      summary: 标记面试完成
      parameters:
        - $ref: '#/components/parameters/InterviewId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /applications/{applicationId}/final-decisions:
    post:
      tags: [Memberships]
      summary: 终审决策
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalDecisionRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
