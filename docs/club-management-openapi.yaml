components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ClubId:
      name: clubId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DepartmentId:
      name: departmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PositionId:
      name: positionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    InterviewId:
      name: interviewId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ExitApplicationId:
      name: exitApplicationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RoleId:
      name: roleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
        traceId:
          type: string
    PagedResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/PageData'
        traceId:
          type: string
    PageData:
      type: object
      properties:
        list:
          type: array
          items: {}
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    RegisterRequest:
      type: object
      required: [username, password, realName, phone, email]
      properties:
        username:
          type: string
        password:
          type: string
        realName:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        user:
          $ref: '#/components/schemas/User'
    CurrentUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
