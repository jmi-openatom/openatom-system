      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        realName:
          type: string
        gender:
          type: string
        phone:
          type: string
        email:
          type: string
        studentNo:
          type: string
        college:
          type: string
        major:
          type: string
        grade:
          type: string
        avatar:
          type: string
        status:
          $ref: '#/components/schemas/UserStatus'
        lastLoginAt:
