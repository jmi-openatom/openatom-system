name: Lab LMS CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - lab-management-system/**
      - lab-ui-web/**
      - .github/workflows/lab-lms.yml
  pull_request:
    branches:
      - main
    paths:
      - lab-management-system/**
      - lab-ui-web/**
      - .github/workflows/lab-lms.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Build backend
        run: |
          cd lab-management-system
          ../backend/mvnw -q -DskipTests package

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lab-ui-web/package-lock.json
      - name: Build frontend
        run: |
          cd lab-ui-web
          npm ci
          npm run build

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs:
      - backend-check
      - frontend-check
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deployment bundle
        run: |
          rm -rf .deploy/lms
          mkdir -p .deploy/lms
          rsync -a --delete \
            --exclude target \
            --exclude .idea \
            --include .env.example \
            --include .env.production.example \
            --exclude .env \
            --exclude .env.* \
            lab-management-system/ .deploy/lms/lab-management-system/
          rsync -a --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .vite \
            --include .env.example \
            --include .env.production.example \
            --exclude .env \
            --exclude .env.* \
            lab-ui-web/ .deploy/lms/lab-ui-web/
          cp .dockerignore .deploy/lms/.dockerignore
      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            mkdir -p "${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}"
      - name: Upload deployment source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: .deploy/lms/lab-management-system,.deploy/lms/lab-ui-web,.deploy/lms/.dockerignore
          target: ${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}
          strip_components: 2
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            cd "${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}"

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            EXISTING_LMS_ENV=".env"
            CMS_ENV="${{ vars.CMS_DEPLOY_PATH || '/www/wwwroot/openatom-system' }}/.env"

            env_file_value() {
              key="$1"
              file="$2"
              [ -f "$file" ] || return 0
              awk -v wanted="$key" '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  line = $0
                  sub(/^[[:space:]]*export[[:space:]]+/, "", line)
                  pos = index(line, "=")
                  if (pos == 0) next
                  name = substr(line, 1, pos - 1)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", name)
                  if (name == wanted) {
                    value = substr(line, pos + 1)
                    sub(/^[[:space:]]+/, "", value)
                    print value
                  }
                }
              ' "$file" | tail -n 1
            }

            first_existing_env() {
              for key in "$@"; do
                value="$(env_file_value "$key" "$EXISTING_LMS_ENV")"
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                  return 0
                fi
                value="$(env_file_value "$key" "$CMS_ENV")"
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                  return 0
                fi
              done
              return 0
            }

            literal_or_existing() {
              literal="$1"
              shift
              if [ -n "$literal" ]; then
                printf '%s' "$literal"
                return 0
              fi
              first_existing_env "$@"
            }

            existing_or_literal() {
              literal="$1"
              shift
              value="$(first_existing_env "$@")"
              if [ -n "$value" ]; then
                printf '%s' "$value"
                return 0
              fi
              printf '%s' "$literal"
            }

            generated_secret() {
              if command -v openssl >/dev/null 2>&1; then
                openssl rand -hex 32
              else
                tr -dc 'A-Za-z0-9' </dev/urandom | head -c 64
                printf '\n'
              fi
            }

            LAB_MYSQL_DATABASE="$(existing_or_literal "${{ vars.LAB_MYSQL_DATABASE || 'db_lab_management' }}" LAB_MYSQL_DATABASE)"
            LAB_DB_USERNAME="$(literal_or_existing "${{ secrets.LAB_DB_USERNAME || secrets.CMS_DB_USERNAME || secrets.DB_USERNAME || secrets.MYSQL_USERNAME }}" LAB_DB_USERNAME CMS_DB_USERNAME DB_USERNAME MYSQL_USERNAME)"
            LAB_DB_PASSWORD="$(literal_or_existing "${{ secrets.LAB_DB_PASSWORD || secrets.CMS_DB_PASSWORD || secrets.DB_PASSWORD || secrets.MYSQL_PASSWORD }}" LAB_DB_PASSWORD CMS_DB_PASSWORD DB_PASSWORD MYSQL_PASSWORD)"
            LAB_MYSQL_ROOT_PASSWORD="$(literal_or_existing "${{ secrets.LAB_MYSQL_ROOT_PASSWORD || secrets.LAB_DB_PASSWORD || secrets.CMS_DB_PASSWORD || secrets.DB_PASSWORD || secrets.MYSQL_PASSWORD }}" LAB_MYSQL_ROOT_PASSWORD LAB_DB_PASSWORD CMS_DB_PASSWORD DB_PASSWORD MYSQL_PASSWORD)"
            LAB_RABBITMQ_USERNAME="$(literal_or_existing "${{ secrets.LAB_RABBITMQ_USERNAME || secrets.LAB_DB_USERNAME || secrets.CMS_DB_USERNAME || secrets.DB_USERNAME || secrets.MYSQL_USERNAME }}" LAB_RABBITMQ_USERNAME LAB_DB_USERNAME CMS_DB_USERNAME DB_USERNAME MYSQL_USERNAME)"
            LAB_RABBITMQ_PASSWORD="$(literal_or_existing "${{ secrets.LAB_RABBITMQ_PASSWORD || secrets.LAB_DB_PASSWORD || secrets.CMS_DB_PASSWORD || secrets.DB_PASSWORD || secrets.MYSQL_PASSWORD }}" LAB_RABBITMQ_PASSWORD LAB_DB_PASSWORD CMS_DB_PASSWORD DB_PASSWORD MYSQL_PASSWORD)"
            LAB_JWT_SECRET="$(literal_or_existing "${{ secrets.LAB_JWT_SECRET }}" LAB_JWT_SECRET SA_TOKEN_JWT_SECRET_KEY)"
            if [ -z "$LAB_JWT_SECRET" ]; then
              LAB_JWT_SECRET="$(generated_secret)"
            fi
            CMS_OAUTH_CLIENT_SECRET="$(literal_or_existing "${{ secrets.CMS_OAUTH_CLIENT_SECRET }}" CMS_OAUTH_CLIENT_SECRET OAUTH_CLIENT_SECRET)"
            LAB_AI_API_KEY="$(literal_or_existing "${{ secrets.LAB_AI_API_KEY }}" LAB_AI_API_KEY)"

            umask 077
            {
              printf 'LAB_IMAGE_TAG=%s\n' '${{ github.sha }}'
              printf 'LAB_FRONTEND_PORT=%s\n' "$(existing_or_literal "${{ vars.LAB_FRONTEND_PORT || '18091' }}" LAB_FRONTEND_PORT)"
              printf 'LAB_SERVER_PORT=%s\n' "$(existing_or_literal "${{ vars.LAB_SERVER_PORT || '8091' }}" LAB_SERVER_PORT)"
              printf 'JAVA_OPTS=%s\n' "$(existing_or_literal "${{ vars.LAB_JAVA_OPTS || '-Xms256m -Xmx768m' }}" JAVA_OPTS)"
              printf 'LAB_MYSQL_DATABASE=%s\n' "$LAB_MYSQL_DATABASE"
              printf 'LAB_MYSQL_ROOT_PASSWORD=%s\n' "$LAB_MYSQL_ROOT_PASSWORD"
              printf 'LAB_DB_USERNAME=%s\n' "$LAB_DB_USERNAME"
              printf 'LAB_DB_PASSWORD=%s\n' "$LAB_DB_PASSWORD"
              printf 'LAB_RABBITMQ_USERNAME=%s\n' "$LAB_RABBITMQ_USERNAME"
              printf 'LAB_RABBITMQ_PASSWORD=%s\n' "$LAB_RABBITMQ_PASSWORD"
              printf 'LAB_RABBITMQ_VHOST=%s\n' "$(existing_or_literal "${{ vars.LAB_RABBITMQ_VHOST || '/' }}" LAB_RABBITMQ_VHOST)"
              printf 'LAB_RABBITMQ_PUBLIC_BIND=%s\n' "$(existing_or_literal "${{ vars.LAB_RABBITMQ_PUBLIC_BIND || '127.0.0.1' }}" LAB_RABBITMQ_PUBLIC_BIND)"
              printf 'LAB_RABBITMQ_PUBLIC_PORT=%s\n' "$(existing_or_literal "${{ vars.LAB_RABBITMQ_PUBLIC_PORT || '5673' }}" LAB_RABBITMQ_PUBLIC_PORT)"
              printf 'LAB_RABBITMQ_MANAGEMENT_BIND=%s\n' "$(existing_or_literal "${{ vars.LAB_RABBITMQ_MANAGEMENT_BIND || '127.0.0.1' }}" LAB_RABBITMQ_MANAGEMENT_BIND)"
              printf 'LAB_RABBITMQ_MANAGEMENT_PORT=%s\n' "$(existing_or_literal "${{ vars.LAB_RABBITMQ_MANAGEMENT_PORT || '15673' }}" LAB_RABBITMQ_MANAGEMENT_PORT)"
              printf 'LAB_JWT_SECRET=%s\n' "$LAB_JWT_SECRET"
              printf 'LAB_TOKEN_TTL_MINUTES=%s\n' "$(existing_or_literal "${{ vars.LAB_TOKEN_TTL_MINUTES || '720' }}" LAB_TOKEN_TTL_MINUTES)"
              printf 'LAB_DEV_LOGIN_ENABLED=false\n'
              printf 'CMS_OAUTH_AUTHORIZE_URL=%s\n' "$(existing_or_literal "${{ vars.CMS_OAUTH_AUTHORIZE_URL || 'https://oauth.jmi-openatom.cn/oauth/authorize' }}" CMS_OAUTH_AUTHORIZE_URL)"
              printf 'CMS_OAUTH_TOKEN_URL=%s\n' "$(existing_or_literal "${{ vars.CMS_OAUTH_TOKEN_URL || 'https://oauth.jmi-openatom.cn/oauth/token' }}" CMS_OAUTH_TOKEN_URL)"
              printf 'CMS_OAUTH_USERINFO_URL=%s\n' "$(existing_or_literal "${{ vars.CMS_OAUTH_USERINFO_URL || 'https://oauth.jmi-openatom.cn/oauth/userinfo' }}" CMS_OAUTH_USERINFO_URL)"
              printf 'CMS_OAUTH_CLIENT_ID=%s\n' "$(existing_or_literal "${{ vars.CMS_OAUTH_CLIENT_ID || 'lab-lms' }}" CMS_OAUTH_CLIENT_ID)"
              printf 'CMS_OAUTH_CLIENT_SECRET=%s\n' "$CMS_OAUTH_CLIENT_SECRET"
              printf 'LAB_OAUTH_REDIRECT_URI=%s\n' "$(existing_or_literal "${{ vars.LAB_OAUTH_REDIRECT_URI || 'https://lab.jmi-openatom.cn/auth/callback' }}" LAB_OAUTH_REDIRECT_URI)"
              printf 'CMS_OAUTH_SCOPES=%s\n' "$(existing_or_literal "${{ vars.CMS_OAUTH_SCOPES || 'openid profile' }}" CMS_OAUTH_SCOPES)"
              printf 'LAB_MQ_EXCHANGE=%s\n' "$(existing_or_literal "${{ vars.LAB_MQ_EXCHANGE || 'openatom.lab.events' }}" LAB_MQ_EXCHANGE)"
              printf 'LAB_MQ_CLUB_SCORE_ROUTING_KEY=%s\n' "$(existing_or_literal "${{ vars.LAB_MQ_CLUB_SCORE_ROUTING_KEY || 'club.score.add' }}" LAB_MQ_CLUB_SCORE_ROUTING_KEY)"
              printf 'LAB_ATTENDANCE_STANDARD_TIME=%s\n' "$(existing_or_literal "${{ vars.LAB_ATTENDANCE_STANDARD_TIME || '09:00' }}" LAB_ATTENDANCE_STANDARD_TIME)"
              printf 'LAB_ATTENDANCE_LATE_CUTOFF_TIME=%s\n' "$(existing_or_literal "${{ vars.LAB_ATTENDANCE_LATE_CUTOFF_TIME || '09:30' }}" LAB_ATTENDANCE_LATE_CUTOFF_TIME)"
              printf 'LAB_ONSITE_SCORE_AWARD=%s\n' "$(existing_or_literal "${{ vars.LAB_ONSITE_SCORE_AWARD || '2' }}" LAB_ONSITE_SCORE_AWARD)"
              printf 'LAB_AUTO_SCORE_AWARD=%s\n' "$(existing_or_literal "${{ vars.LAB_AUTO_SCORE_AWARD || '3' }}" LAB_AUTO_SCORE_AWARD)"
              printf 'LAB_LATE_PENALTY=%s\n' "$(existing_or_literal "${{ vars.LAB_LATE_PENALTY || '-5' }}" LAB_LATE_PENALTY)"
              printf 'LAB_ABSENT_PENALTY=%s\n' "$(existing_or_literal "${{ vars.LAB_ABSENT_PENALTY || '-10' }}" LAB_ABSENT_PENALTY)"
              printf 'LAB_ALLOWED_CIDRS=%s\n' "$(existing_or_literal "${{ vars.LAB_ALLOWED_CIDRS || '127.0.0.1/32,::1/128' }}" LAB_ALLOWED_CIDRS)"
              printf 'LAB_AI_ENABLED=%s\n' "$(existing_or_literal "${{ vars.LAB_AI_ENABLED || 'false' }}" LAB_AI_ENABLED)"
              printf 'LAB_AI_ENDPOINT=%s\n' "$(existing_or_literal "${{ vars.LAB_AI_ENDPOINT }}" LAB_AI_ENDPOINT)"
              printf 'LAB_AI_API_KEY=%s\n' "$LAB_AI_API_KEY"
              printf 'LAB_AI_MODEL=%s\n' "$(existing_or_literal "${{ vars.LAB_AI_MODEL || 'gpt-4.1-mini' }}" LAB_AI_MODEL)"
              printf 'LAB_SANDBOX_ENDPOINT=%s\n' "$(existing_or_literal "${{ vars.LAB_SANDBOX_ENDPOINT }}" LAB_SANDBOX_ENDPOINT)"
              printf 'LAB_SANDBOX_TIMEOUT_MS=%s\n' "$(existing_or_literal "${{ vars.LAB_SANDBOX_TIMEOUT_MS || '5000' }}" LAB_SANDBOX_TIMEOUT_MS)"
            } > .env.next
            mv .env.next .env
            chmod 600 .env

            $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml pull lab-mysql lab-rabbitmq || true
            $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml build lab-backend lab-frontend
            $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml up -d --remove-orphans

            for attempt in $(seq 1 36); do
              if curl -fsS "http://127.0.0.1:${{ vars.LAB_FRONTEND_PORT || '18091' }}/api/health" >/dev/null; then
                $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml ps
                exit 0
              fi
              sleep 5
            done

            echo "LMS deployment failed health check."
            $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml ps
            $COMPOSE_CMD --env-file .env -f lab-management-system/docker-compose.prod.yml logs --tail=200 lab-backend
            exit 1
