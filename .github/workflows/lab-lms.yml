name: Lab LMS CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - lab-management-system/**
      - lab-ui-web/**
      - .github/workflows/lab-lms.yml
  pull_request:
    branches:
      - main
    paths:
      - lab-management-system/**
      - lab-ui-web/**
      - .github/workflows/lab-lms.yml

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Build backend
        run: |
          cd lab-management-system
          ../backend/mvnw -q -DskipTests package

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lab-ui-web/package-lock.json
      - name: Build frontend
        run: |
          cd lab-ui-web
          npm ci
          npm run build

  docker-images:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs:
      - backend-check
      - frontend-check
    runs-on: ubuntu-latest
    outputs:
      backend_image_sha: ${{ steps.images.outputs.backend_sha }}
      frontend_image_sha: ${{ steps.images.outputs.frontend_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare image names
        id: images
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          backend="${REGISTRY}/${repo}/lab-lms-backend"
          frontend="${REGISTRY}/${repo}/lab-lms-frontend"
          echo "backend=${backend}" >> "$GITHUB_OUTPUT"
          echo "frontend=${frontend}" >> "$GITHUB_OUTPUT"
          echo "backend_sha=${backend}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_sha=${frontend}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: lab-management-system/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_sha }}
            ${{ steps.images.outputs.backend }}:latest
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: lab-ui-web
          file: lab-ui-web/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ steps.images.outputs.frontend_sha }}
            ${{ steps.images.outputs.frontend }}:latest

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: docker-images
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            mkdir -p "${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}"
      - name: Upload production compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: lab-management-system/docker-compose.prod.yml
          target: ${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}
          strip_components: 1
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            cd "${{ vars.LAB_DEPLOY_PATH || '/www/wwwroot/openatom-lms' }}"

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            umask 077
            cat > .env <<'LAB_ENV'
            LAB_BACKEND_IMAGE=${{ needs.docker-images.outputs.backend_image_sha }}
            LAB_FRONTEND_IMAGE=${{ needs.docker-images.outputs.frontend_image_sha }}
            LAB_FRONTEND_PORT=${{ vars.LAB_FRONTEND_PORT || '18091' }}
            LAB_SERVER_PORT=${{ vars.LAB_SERVER_PORT || '8091' }}
            JAVA_OPTS=${{ vars.LAB_JAVA_OPTS || '-Xms256m -Xmx768m' }}
            LAB_MYSQL_DATABASE=${{ vars.LAB_MYSQL_DATABASE || 'db_lab_management' }}
            LAB_MYSQL_ROOT_PASSWORD=${{ secrets.LAB_MYSQL_ROOT_PASSWORD }}
            LAB_DB_USERNAME=${{ secrets.LAB_DB_USERNAME }}
            LAB_DB_PASSWORD=${{ secrets.LAB_DB_PASSWORD }}
            LAB_RABBITMQ_USERNAME=${{ secrets.LAB_RABBITMQ_USERNAME }}
            LAB_RABBITMQ_PASSWORD=${{ secrets.LAB_RABBITMQ_PASSWORD }}
            LAB_RABBITMQ_VHOST=${{ vars.LAB_RABBITMQ_VHOST || '/' }}
            LAB_RABBITMQ_PUBLIC_BIND=${{ vars.LAB_RABBITMQ_PUBLIC_BIND || '127.0.0.1' }}
            LAB_RABBITMQ_PUBLIC_PORT=${{ vars.LAB_RABBITMQ_PUBLIC_PORT || '5673' }}
            LAB_RABBITMQ_MANAGEMENT_BIND=${{ vars.LAB_RABBITMQ_MANAGEMENT_BIND || '127.0.0.1' }}
            LAB_RABBITMQ_MANAGEMENT_PORT=${{ vars.LAB_RABBITMQ_MANAGEMENT_PORT || '15673' }}
            LAB_JWT_SECRET=${{ secrets.LAB_JWT_SECRET }}
            LAB_TOKEN_TTL_MINUTES=${{ vars.LAB_TOKEN_TTL_MINUTES || '720' }}
            LAB_DEV_LOGIN_ENABLED=false
            CMS_OAUTH_AUTHORIZE_URL=${{ vars.CMS_OAUTH_AUTHORIZE_URL || 'https://oauth.jmi-openatom.cn/oauth/authorize' }}
            CMS_OAUTH_TOKEN_URL=${{ vars.CMS_OAUTH_TOKEN_URL || 'https://oauth.jmi-openatom.cn/oauth/token' }}
            CMS_OAUTH_USERINFO_URL=${{ vars.CMS_OAUTH_USERINFO_URL || 'https://oauth.jmi-openatom.cn/oauth/userinfo' }}
            CMS_OAUTH_CLIENT_ID=${{ vars.CMS_OAUTH_CLIENT_ID || 'lab-lms' }}
            CMS_OAUTH_CLIENT_SECRET=${{ secrets.CMS_OAUTH_CLIENT_SECRET }}
            LAB_OAUTH_REDIRECT_URI=${{ vars.LAB_OAUTH_REDIRECT_URI || 'https://lab.jmi-openatom.cn/auth/callback' }}
            CMS_OAUTH_SCOPES=${{ vars.CMS_OAUTH_SCOPES || 'openid profile' }}
            LAB_MQ_EXCHANGE=${{ vars.LAB_MQ_EXCHANGE || 'openatom.lab.events' }}
            LAB_MQ_CLUB_SCORE_ROUTING_KEY=${{ vars.LAB_MQ_CLUB_SCORE_ROUTING_KEY || 'club.score.add' }}
            LAB_ATTENDANCE_STANDARD_TIME=${{ vars.LAB_ATTENDANCE_STANDARD_TIME || '09:00' }}
            LAB_ATTENDANCE_LATE_CUTOFF_TIME=${{ vars.LAB_ATTENDANCE_LATE_CUTOFF_TIME || '09:30' }}
            LAB_ONSITE_SCORE_AWARD=${{ vars.LAB_ONSITE_SCORE_AWARD || '2' }}
            LAB_AUTO_SCORE_AWARD=${{ vars.LAB_AUTO_SCORE_AWARD || '3' }}
            LAB_LATE_PENALTY=${{ vars.LAB_LATE_PENALTY || '-5' }}
            LAB_ABSENT_PENALTY=${{ vars.LAB_ABSENT_PENALTY || '-10' }}
            LAB_ALLOWED_CIDRS=${{ vars.LAB_ALLOWED_CIDRS || '127.0.0.1/32,::1/128' }}
            LAB_AI_ENABLED=${{ vars.LAB_AI_ENABLED || 'false' }}
            LAB_AI_ENDPOINT=${{ vars.LAB_AI_ENDPOINT }}
            LAB_AI_API_KEY=${{ secrets.LAB_AI_API_KEY }}
            LAB_AI_MODEL=${{ vars.LAB_AI_MODEL || 'gpt-4.1-mini' }}
            LAB_SANDBOX_ENDPOINT=${{ vars.LAB_SANDBOX_ENDPOINT }}
            LAB_SANDBOX_TIMEOUT_MS=${{ vars.LAB_SANDBOX_TIMEOUT_MS || '5000' }}
            LAB_ENV
            chmod 600 .env

            $COMPOSE_CMD -f docker-compose.prod.yml pull
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --remove-orphans

            for attempt in $(seq 1 36); do
              if curl -fsS "http://127.0.0.1:${{ vars.LAB_FRONTEND_PORT || '18091' }}/api/health" >/dev/null; then
                $COMPOSE_CMD -f docker-compose.prod.yml ps
                exit 0
              fi
              sleep 5
            done

            echo "LMS deployment failed health check."
            $COMPOSE_CMD -f docker-compose.prod.yml ps
            $COMPOSE_CMD -f docker-compose.prod.yml logs --tail=200 lab-backend
            exit 1
