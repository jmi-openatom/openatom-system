name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/web_pc/pnpm-lock.yaml'

      - name: Frontend Build Check
        run: |
          cd frontend/web_pc
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend Build Check
        run: mvn -f backend/pom.xml clean compile

  deploy:
    needs: [frontend-check, backend-check]
    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}" ] || (echo "SERVER_HOST is empty" && exit 1)
          [ -n "${{ secrets.SERVER_USER }}" ] || (echo "SERVER_USER is empty" && exit 1)
          [ -n "${{ secrets.SERVER_PASSWORD }}" ] || (echo "SERVER_PASSWORD is empty" && exit 1)

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            cd /www/wwwroot/openatom-system || { echo "Directory not found"; exit 1; }
            
            find . -name ".DS_Store" -delete
            
            git fetch --all
            git reset --hard origin/main
            
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            $COMPOSE_CMD up -d --build
            sleep 10
            $COMPOSE_CMD ps

            for service in mysql backend frontend; do
              if ! $COMPOSE_CMD ps "$service" | grep -q "Up"; then
                echo "Service $service is not running"
                $COMPOSE_CMD logs --tail=200 "$service" || true
                exit 1
              fi
            done
