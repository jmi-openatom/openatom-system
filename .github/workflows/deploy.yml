name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}" ] || (echo "SERVER_HOST is empty" && exit 1)
          [ -n "${{ secrets.SERVER_USER }}" ] || (echo "SERVER_USER is empty" && exit 1)
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || (echo "SERVER_SSH_KEY is empty" && exit 1)

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/wwwroot/openatom-system || { echo "Directory not found"; exit 1; }
            
            # 清理可能导致冲突的本地文件（如 .DS_Store）
            find . -name ".DS_Store" -delete
            
            # 强制重置本地修改并拉取最新代码
            git fetch --all
            git reset --hard origin/main
            
            # 使用最新的 docker compose (较新版本 docker 已集成 compose)
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose up -d --build
            else
              docker compose up -d --build
            fi
