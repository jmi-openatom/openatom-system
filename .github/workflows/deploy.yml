name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/web_pc/pnpm-lock.yaml
            frontend/uni_app/pnpm-lock.yaml
      - name: Frontend Build Check
        run: |
          cd frontend/web_pc
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build
      - name: UniApp Type Check
        run: |
          cd frontend/uni_app
          pnpm install --frozen-lockfile
          pnpm run typecheck

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Backend Build Check
        run: |
          cd backend
          ./mvnw -q -DskipTests compile

  bot-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: AstrBot Plugin Syntax Check
        run: |
          python -m py_compile astrbot/data/plugins/astrbot_plugin_openatom_api/main.py

  deploy:
    needs: [ frontend-check, backend-check, bot-check ]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            cd /www/wwwroot/openatom-system || { echo "Directory not found"; exit 1; }
            
            git fetch --all
            git reset --hard origin/main
            
            # 兼容性处理
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            # --- 关键修改：彻底停止旧容器，释放 6379 等端口 ---
            echo "Step 1: Stopping and cleaning up existing containers..."
            $COMPOSE_CMD down --remove-orphans

            # 计算版本号
            BUILD_NUMBER="${{ github.run_number }}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            PKG_VER=$(grep -oP '"version"\s*:\s*"\K[^"]+' frontend/web_pc/package.json || echo "1.0.0")
            APP_VER="v$PKG_VER.$BUILD_NUMBER-$SHORT_SHA"

            echo "Step 2: Starting deployment with version: $APP_VER"
            $COMPOSE_CMD pull astrbot napcat || true
            VITE_APP_VERSION=$APP_VER \
              VITE_API_BASE_URL=https://api.jmi-openatom.cn/api/v1 \
              $COMPOSE_CMD up -d --build

            # 等待后端真正监听端口，避免把启动失败但仍在重启的容器误判为部署成功
            BACKEND_READY=false
            for attempt in $(seq 1 36); do
              if $COMPOSE_CMD exec -T backend bash -c 'exec 3<>/dev/tcp/127.0.0.1/8921' >/dev/null 2>&1; then
                BACKEND_READY=true
                break
              fi
              sleep 5
            done

            if [ "$BACKEND_READY" != "true" ]; then
              echo "Critical Error: Backend did not become ready within 180 seconds."
              $COMPOSE_CMD ps
              $COMPOSE_CMD logs --tail=200 backend
              exit 1
            fi

            $COMPOSE_CMD ps

            for service in redis backend frontend astrbot napcat; do
              if ! $COMPOSE_CMD ps "$service" | grep -iq "Up"; then
                echo "Critical Error: Service $service is not running!"
                $COMPOSE_CMD logs --tail=100 "$service"
                exit 1
              fi
            done
            echo "Deployment finished successfully."
