name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SERVER
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}" ] || (echo "SERVER_HOST is empty" && exit 1)
          [ -n "${{ secrets.SERVER_USER }}" ] || (echo "SERVER_USER is empty" && exit 1)
          [ -n "${{ secrets.SERVER_PASSWORD }}" ] || (echo "SERVER_PASSWORD is empty" && exit 1)

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -eu
            cd /www/wwwroot/openatom-system || { echo "Directory not found"; exit 1; }
            
            # 清理可能导致冲突的本地文件（如 .DS_Store）
            find . -name ".DS_Store" -delete
            
            # 强制重置本地修改并拉取最新代码
            git fetch --all
            git reset --hard origin/main
            
            # 使用最新的 docker compose (较新版本 docker 已集成 compose)
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            $COMPOSE_CMD up -d --build
            sleep 10
            $COMPOSE_CMD ps

            # 任一核心容器未运行时，输出日志并失败
            for service in mysql backend frontend; do
              if ! $COMPOSE_CMD ps "$service" | grep -q "Up"; then
                echo "Service $service is not running"
                $COMPOSE_CMD logs --tail=200 "$service" || true
                exit 1
              fi
            done
