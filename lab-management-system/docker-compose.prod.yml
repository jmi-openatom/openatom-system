services:
  lab-mysql:
    image: mysql:8.4
    container_name: openatom-lms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${LAB_MYSQL_ROOT_PASSWORD:-${LAB_DB_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD or LAB_DB_PASSWORD is required}}}
      MYSQL_DATABASE: ${LAB_MYSQL_DATABASE:-db_lab_management}
      MYSQL_USER: ${LAB_DB_USERNAME:-${DB_USERNAME:?DB_USERNAME or LAB_DB_USERNAME is required}}
      MYSQL_PASSWORD: ${LAB_DB_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD or LAB_DB_PASSWORD is required}}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - lab_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s
    networks:
      - openatom-lms
    restart: unless-stopped

  lab-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: openatom-lms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${LAB_RABBITMQ_USERNAME:-${LAB_DB_USERNAME:-${DB_USERNAME:?DB_USERNAME or LAB_DB_USERNAME is required}}}
      RABBITMQ_DEFAULT_PASS: ${LAB_RABBITMQ_PASSWORD:-${LAB_DB_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD or LAB_DB_PASSWORD is required}}}
      RABBITMQ_DEFAULT_VHOST: ${LAB_RABBITMQ_VHOST:-/}
      TZ: Asia/Shanghai
    ports:
      - "${LAB_RABBITMQ_PUBLIC_BIND:-127.0.0.1}:${LAB_RABBITMQ_PUBLIC_PORT:-5673}:5672"
      - "${LAB_RABBITMQ_MANAGEMENT_BIND:-127.0.0.1}:${LAB_RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    volumes:
      - lab_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - openatom-lms
    restart: unless-stopped

  lab-backend:
    image: ${LAB_BACKEND_IMAGE:?LAB_BACKEND_IMAGE is required}
    container_name: openatom-lms-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:-}
      LAB_SERVER_PORT: ${LAB_SERVER_PORT:-8091}
      LAB_DB_URL: jdbc:mysql://lab-mysql:3306/${LAB_MYSQL_DATABASE:-db_lab_management}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      LAB_DB_USERNAME: ${LAB_DB_USERNAME:-${DB_USERNAME:?DB_USERNAME or LAB_DB_USERNAME is required}}
      LAB_DB_PASSWORD: ${LAB_DB_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD or LAB_DB_PASSWORD is required}}
      LAB_RABBITMQ_HOST: lab-rabbitmq
      LAB_RABBITMQ_PORT: 5672
      LAB_RABBITMQ_USERNAME: ${LAB_RABBITMQ_USERNAME:-${LAB_DB_USERNAME:-${DB_USERNAME:?DB_USERNAME or LAB_DB_USERNAME is required}}}
      LAB_RABBITMQ_PASSWORD: ${LAB_RABBITMQ_PASSWORD:-${LAB_DB_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD or LAB_DB_PASSWORD is required}}}
      LAB_RABBITMQ_VHOST: ${LAB_RABBITMQ_VHOST:-/}
      LAB_JWT_SECRET: ${LAB_JWT_SECRET:?LAB_JWT_SECRET is required}
      LAB_TOKEN_TTL_MINUTES: ${LAB_TOKEN_TTL_MINUTES:-720}
      LAB_DEV_LOGIN_ENABLED: ${LAB_DEV_LOGIN_ENABLED:-false}
      CMS_OAUTH_AUTHORIZE_URL: ${CMS_OAUTH_AUTHORIZE_URL:?CMS_OAUTH_AUTHORIZE_URL is required}
      CMS_OAUTH_TOKEN_URL: ${CMS_OAUTH_TOKEN_URL:?CMS_OAUTH_TOKEN_URL is required}
      CMS_OAUTH_USERINFO_URL: ${CMS_OAUTH_USERINFO_URL:?CMS_OAUTH_USERINFO_URL is required}
      CMS_OAUTH_CLIENT_ID: ${CMS_OAUTH_CLIENT_ID:?CMS_OAUTH_CLIENT_ID is required}
      CMS_OAUTH_CLIENT_SECRET: ${CMS_OAUTH_CLIENT_SECRET:-}
      LAB_OAUTH_REDIRECT_URI: ${LAB_OAUTH_REDIRECT_URI:?LAB_OAUTH_REDIRECT_URI is required}
      CMS_OAUTH_SCOPES: ${CMS_OAUTH_SCOPES:-openid profile}
      LAB_MQ_EXCHANGE: ${LAB_MQ_EXCHANGE:-openatom.lab.events}
      LAB_MQ_CLUB_SCORE_ROUTING_KEY: ${LAB_MQ_CLUB_SCORE_ROUTING_KEY:-club.score.add}
      LAB_ATTENDANCE_STANDARD_TIME: ${LAB_ATTENDANCE_STANDARD_TIME:-09:00}
      LAB_ATTENDANCE_LATE_CUTOFF_TIME: ${LAB_ATTENDANCE_LATE_CUTOFF_TIME:-09:30}
      LAB_ONSITE_SCORE_AWARD: ${LAB_ONSITE_SCORE_AWARD:-2}
      LAB_AUTO_SCORE_AWARD: ${LAB_AUTO_SCORE_AWARD:-3}
      LAB_LATE_PENALTY: ${LAB_LATE_PENALTY:--5}
      LAB_ABSENT_PENALTY: ${LAB_ABSENT_PENALTY:--10}
      LAB_ALLOWED_CIDRS: ${LAB_ALLOWED_CIDRS:-127.0.0.1/32,::1/128}
      LAB_AI_ENABLED: ${LAB_AI_ENABLED:-false}
      LAB_AI_ENDPOINT: ${LAB_AI_ENDPOINT:-}
      LAB_AI_API_KEY: ${LAB_AI_API_KEY:-}
      LAB_AI_MODEL: ${LAB_AI_MODEL:-gpt-4.1-mini}
      LAB_SANDBOX_ENDPOINT: ${LAB_SANDBOX_ENDPOINT:-}
      LAB_SANDBOX_TIMEOUT_MS: ${LAB_SANDBOX_TIMEOUT_MS:-5000}
    depends_on:
      lab-mysql:
        condition: service_healthy
      lab-rabbitmq:
        condition: service_healthy
    networks:
      - openatom-lms
    restart: unless-stopped

  lab-frontend:
    image: ${LAB_FRONTEND_IMAGE:?LAB_FRONTEND_IMAGE is required}
    container_name: openatom-lms-frontend
    ports:
      - "${LAB_FRONTEND_PORT:-18091}:80"
    depends_on:
      - lab-backend
    networks:
      - openatom-lms
    restart: unless-stopped

networks:
  openatom-lms:
    driver: bridge

volumes:
  lab_mysql_data:
  lab_rabbitmq_data:
