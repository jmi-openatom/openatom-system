services:
  lms-mysql:
    image: mysql:8.0
    container_name: lms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${LMS_MYSQL_ROOT_PASSWORD:-lms123}
      MYSQL_DATABASE: db_lab_management
    volumes:
      - lms_mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - lms-network
    restart: always

  lms-redis:
    image: redis:7-alpine
    container_name: lms-redis
    environment:
      REDIS_PASSWORD: ${LMS_REDIS_PASSWORD:-lms123}
    command: redis-server --requirepass ${LMS_REDIS_PASSWORD:-lms123} --appendonly yes
    volumes:
      - lms_redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"${LMS_REDIS_PASSWORD:-lms123}\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - lms-network
    restart: always

  lms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-backend
    environment:
      - DB_HOST=lms-mysql
      - DB_PORT=3306
      - DB_NAME=db_lab_management
      - DB_USER=root
      - DB_PASSWORD=${LMS_MYSQL_ROOT_PASSWORD:-lms123}
      - REDIS_HOST=lms-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${LMS_REDIS_PASSWORD:-lms123}
      - SA_TOKEN_JWT_SECRET_KEY=${LMS_SA_TOKEN_JWT_SECRET_KEY:-lms-jwt-secret-change-me}
      - APP_CMS_OAUTH_ISSUER=${APP_CMS_OAUTH_ISSUER:-https://oauth.jmi-openatom.cn/api/v1}
      - APP_CMS_API_BASE_URL=${APP_CMS_API_BASE_URL:-https://api.jmi-openatom.cn/api/v1}
      - APP_AI_API_KEY=${APP_AI_API_KEY:-}
      - APP_AI_API_BASE_URL=${APP_AI_API_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "8922:8922"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8922'" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      lms-mysql:
        condition: service_healthy
      lms-redis:
        condition: service_healthy
    networks:
      - lms-network
    restart: always

  lms-frontend:
    build:
      context: ./lab-ui-web
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${VITE_APP_VERSION:-unknown}
        - VITE_API_BASE_URL=${VITE_LMS_API_BASE_URL:-https://lms-api.jmi-openatom.cn/api/v1}
        - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY:-https://oauth.jmi-openatom.cn/api/v1}
        - VITE_OIDC_CLIENT_ID=${VITE_LMS_OIDC_CLIENT_ID:-lms-web}
    container_name: lms-frontend
    ports:
      - "${LMS_FRONTEND_PORT:-18081}:80"
    depends_on:
      - lms-backend
    networks:
      - lms-network
    restart: always

networks:
  lms-network:
    driver: bridge

volumes:
  lms_mysql_data:
  lms_redis_data:
