server:
  port: ${LAB_SERVER_PORT:8091}

spring:
  application:
    name: lab-management-system
  datasource:
    url: ${LAB_DB_URL:jdbc:mysql://127.0.0.1:3306/db_lab_management?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${LAB_DB_USERNAME:root}
    password: ${LAB_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  rabbitmq:
    host: ${LAB_RABBITMQ_HOST:127.0.0.1}
    port: ${LAB_RABBITMQ_PORT:5672}
    username: ${LAB_RABBITMQ_USERNAME:guest}
    password: ${LAB_RABBITMQ_PASSWORD:guest}
    virtual-host: ${LAB_RABBITMQ_VHOST:/}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto

lab:
  auth:
    jwt-secret: ${LAB_JWT_SECRET:change-me-change-me-change-me-change-me}
    token-ttl-minutes: ${LAB_TOKEN_TTL_MINUTES:720}
    dev-login-enabled: ${LAB_DEV_LOGIN_ENABLED:false}
    oauth:
      authorize-url: ${CMS_OAUTH_AUTHORIZE_URL:http://127.0.0.1:8080/oauth/authorize}
      token-url: ${CMS_OAUTH_TOKEN_URL:http://127.0.0.1:8080/oauth/token}
      user-info-url: ${CMS_OAUTH_USERINFO_URL:http://127.0.0.1:8080/oauth/userinfo}
      client-id: ${CMS_OAUTH_CLIENT_ID:lab-lms}
      client-secret: ${CMS_OAUTH_CLIENT_SECRET:lab-lms-secret}
      redirect-uri: ${LAB_OAUTH_REDIRECT_URI:http://127.0.0.1:5174/auth/callback}
      scopes: ${CMS_OAUTH_SCOPES:openid profile}
  mq:
    exchange: ${LAB_MQ_EXCHANGE:openatom.lab.events}
    club-score-routing-key: ${LAB_MQ_CLUB_SCORE_ROUTING_KEY:club.score.add}
  attendance:
    standard-time: ${LAB_ATTENDANCE_STANDARD_TIME:09:00}
    late-cutoff-time: ${LAB_ATTENDANCE_LATE_CUTOFF_TIME:09:30}
    onsite-score-award: ${LAB_ONSITE_SCORE_AWARD:2}
    auto-score-award: ${LAB_AUTO_SCORE_AWARD:3}
    late-penalty: ${LAB_LATE_PENALTY:-5}
    absent-penalty: ${LAB_ABSENT_PENALTY:-10}
    allowed-cidrs: ${LAB_ALLOWED_CIDRS:127.0.0.1/32,::1/128}
  ai:
    enabled: ${LAB_AI_ENABLED:false}
    endpoint: ${LAB_AI_ENDPOINT:}
    api-key: ${LAB_AI_API_KEY:}
    model: ${LAB_AI_MODEL:gpt-4.1-mini}
  sandbox:
    endpoint: ${LAB_SANDBOX_ENDPOINT:}
    timeout-ms: ${LAB_SANDBOX_TIMEOUT_MS:5000}
