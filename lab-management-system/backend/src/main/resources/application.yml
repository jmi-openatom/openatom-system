server:
  port: 8922

spring:
  application:
    name: lab-management-system
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_lab_management}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  mail:
    host: ${APP_MAIL_HOST:localhost}
    port: ${APP_MAIL_PORT:25}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}

sa-token:
  token-name: lms-token
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

lab:
  cms:
    oauth-authorize-url: ${APP_CMS_OAUTH_ISSUER:https://oauth.jmi-openatom.cn/api/v1}/oauth/authorize
    user-info-url: ${APP_CMS_API_BASE_URL:https://api.jmi-openatom.cn/api/v1}/auth/me
    score-api-url: ${APP_CMS_API_BASE_URL:https://api.jmi-openatom.cn/api/v1}/points/admin/adjustments
  ai:
    api-key: ${APP_AI_API_KEY:}
    api-base-url: ${APP_AI_API_BASE_URL:https://api.deepseek.com/v1}
    model: ${APP_AI_MODEL:deepseek-chat}
  sandbox:
    mode: ${APP_SANDBOX_MODE:docker}
    work-dir: ${APP_SANDBOX_WORK_DIR:${java.io.tmpdir}/lms-sandbox}
  notice:
    mail-enabled: ${APP_NOTICE_MAIL_ENABLED:false}
    wechat-webhook-url: ${APP_NOTICE_WECHAT_WEBHOOK_URL:}
