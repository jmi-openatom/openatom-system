services:
  redis:
    image: redis:7-alpine
    container_name: openatom-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-openatom123}
    # 关键修复：${REDIS_PASSWORD:-openatom123} 确保即使环境变量缺失也不会报参数错误
    command: redis-server --requirepass ${REDIS_PASSWORD:-openatom123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-openatom123}\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - openatom-network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openatom-backend
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-openatom123}
      - SA_TOKEN_JWT_SECRET_KEY=${SA_TOKEN_JWT_SECRET_KEY:-openatom-docker-jwt-secret-change-me}
      - APP_OIDC_ISSUER=${APP_OIDC_ISSUER:-https://oauth.jmi-openatom.cn/api/v1}
      - APP_APPLICATION_SUBMIT_MAX_PER_SECOND=${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:-5}
      - APP_AVATAR_STORAGE_DIR=/app/uploads/avatars
      - APP_IMAGE_HOSTING_STORAGE_DIR=/app/uploads/images
      - APP_LEAVE_ATTACHMENT_STORAGE_DIR=/app/uploads/leave-attachments
      - APP_DOCUMENT_TEMPLATE_STORAGE_DIR=/app/uploads/document-templates
      - APP_GENERATED_DOCUMENT_STORAGE_DIR=/app/uploads/generated-documents
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - APP_BOT_LEAVE_REVIEW_CALLBACK_URL=${APP_BOT_LEAVE_REVIEW_CALLBACK_URL:-http://127.0.0.1:6198/openatom/leave-review}
      - APP_BOT_CALLBACK_TOKEN=${APP_BOT_CALLBACK_TOKEN:-}
      - APP_NAPCAT_BASE_URL=${APP_NAPCAT_BASE_URL:-http://127.0.0.1:3000}
      - APP_NAPCAT_ACCESS_TOKEN=${APP_NAPCAT_ACCESS_TOKEN:-sRtnBQJy-lqPTWjj}
    network_mode: host
    volumes:
      - avatar_data:/app/uploads
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8921'" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend/web_pc
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${VITE_APP_VERSION:-unknown}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://api.jmi-openatom.cn/api/v1}
        - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY:-https://oauth.jmi-openatom.cn/api/v1}
        - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID:-openatom-web}
    container_name: openatom-frontend
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend
    networks:
      - openatom-network
    restart: always

  astrbot:
    image: soulter/astrbot:latest
    container_name: openatom-astrbot
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "${ASTRBOT_PORT:-6185}:6185"
      - "127.0.0.1:6198:6198"
    volumes:
      - ./astrbot/data:/AstrBot/data
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend
    networks:
      - openatom-network
    restart: always

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: openatom-napcat
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot
    ports:
      - "${NAPCAT_PORT:-6099}:6099"
      - "127.0.0.1:3000:3000"
    volumes:
      - ./astrbot/data:/AstrBot/data
      - ./astrbot/napcat/config:/app/napcat/config
      - ./astrbot/ntqq:/app/.config/QQ
    depends_on:
      - astrbot
    networks:
      - openatom-network
    restart: always

  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    container_name: openatom-docs
    ports:
      - "${DOCS_PORT:-16000}:80"
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - openatom-network
    restart: always

networks:
  openatom-network:
    driver: bridge

volumes:
  redis_data:
  avatar_data:
