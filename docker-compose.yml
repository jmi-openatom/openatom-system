services:
  mysql:
    image: mysql:8.0
    container_name: openatom-mysql
    environment:
      MYSQL_DATABASE: openatom-system
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_USER: ${DB_USERNAME:-openatom-system}
      MYSQL_PASSWORD: ${DB_PASSWORD:-5JS7XaFfJGhXBH2j}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/create_table.sql:/docker-entrypoint-initdb.d/create_table.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME:-openatom-system} -p${DB_PASSWORD:-5JS7XaFfJGhXBH2j} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - openatom-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: openatom-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-openatom123}
    # 关键修复：${REDIS_PASSWORD:-openatom123} 确保即使环境变量缺失也不会报参数错误
    command: redis-server --requirepass ${REDIS_PASSWORD:-openatom123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-openatom123}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - openatom-network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openatom-backend
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/openatom-system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=${DB_USERNAME:-openatom-system}
      - DB_PASSWORD=${DB_PASSWORD:-5JS7XaFfJGhXBH2j}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-openatom123}
      - APP_APPLICATION_SUBMIT_MAX_PER_SECOND=${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:-5}
    ports:
      - "8921:8921"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openatom-network
    restart: always

  frontend:
    build:
      context: ./frontend/web_pc
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${VITE_APP_VERSION:-unknown}
    container_name: openatom-frontend
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - backend
    networks:
      - openatom-network
    restart: always

networks:
  openatom-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
