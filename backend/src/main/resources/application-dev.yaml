spring:
  application:
    name: openatom-system
  flyway:
    enabled: false
  datasource:
    # 本地开发数据库配置，直接修改下面的连接地址、用户名和密码
    url: jdbc:mysql://localhost:3306/openatom_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ab321818
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:openatom-dev-hikari}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:500MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:500MB}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:10}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:1}
          max-wait: ${REDIS_POOL_MAX_WAIT:3000ms}

server:
  port: 8921
  servlet:
    context-path: /api/v1

sa-token:
  token-name: jmiopenatom
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:openatom-development-jwt-secret-change-me}
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true


app:
  google:
    client-id: ${APP_GOOGLE_CLIENT_ID:456373207373-4md7t52dkhbo7p48e8omhjoct2squ06c.apps.googleusercontent.com}
  github:
    client-id: ${APP_GITHUB_CLIENT_ID:Ov23liQQCxTjyoR8WAW9}
    client-secret: ${APP_GITHUB_CLIENT_SECRET:}
    callback-uri: ${APP_GITHUB_CALLBACK_URI:https://www.jmi-openatom.cn/auth/github/callback}
  gitee:
    client-id: ${APP_GITEE_CLIENT_ID:12ed9f6f4df02c05cdf05045221e650e3bd3481f6301707a1d7ac8dd97211fa8}
    client-secret: ${APP_GITEE_CLIENT_SECRET:}
    callback-uri: ${APP_GITEE_CALLBACK_URI:https://www.jmi-openatom.cn/auth/gitee/callback}
  miniapp:
    app-id: ${APP_MINIAPP_APP_ID:wx8c6b52ab95da0938}
    app-secret: ${APP_MINIAPP_APP_SECRET:d15542dcaa23b92191962235dacef7b9}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
  rate-limit:
    application-submit:
      max-per-second: ${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:5}
  avatar:
    storage-dir: ${APP_AVATAR_STORAGE_DIR:./uploads/avatars}
  image-hosting:
