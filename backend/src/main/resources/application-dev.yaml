spring:
  application:
    name: openatom-system
  datasource:
    url: jdbc:mysql://82.39.213.37:3307/openatom-system?serverTimeZone=UTC
    username: ${DB_USENAME:root}
    password: ${DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: 8921
  servlet:
    context-path: /api/v1

sa-token:
  token-name: jmiopenatom
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true


app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
  rate-limit:
    application-submit:
      max-per-second: ${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:5}
