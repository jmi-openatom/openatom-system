spring:
  application:
    name: openatom-system
  flyway:
    enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://156.239.2.231:3307/openatom-system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}

  data:
    redis:
      host: ${REDIS_HOST:156.239.2.231}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: 8921
  servlet:
    context-path: /api/v1

sa-token:
  token-name: jmiopenatom
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:openatom-development-jwt-secret-change-me}
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true


app:
  miniapp:
    app-id: ${APP_MINIAPP_APP_ID:wx8c6b52ab95da0938}
    app-secret: ${APP_MINIAPP_APP_SECRET:d15542dcaa23b92191962235dacef7b9}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
  rate-limit:
    application-submit:
      max-per-second: ${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:5}
  avatar:
    storage-dir: ${APP_AVATAR_STORAGE_DIR:./uploads/avatars}
  image-hosting:
    storage-dir: ${APP_IMAGE_HOSTING_STORAGE_DIR:./uploads/images}
  leave-attachment:
    storage-dir: ${APP_LEAVE_ATTACHMENT_STORAGE_DIR:./uploads/leave-attachments}
  bot:
    callback-token: ${APP_BOT_CALLBACK_TOKEN:}
    leave-review-callback-url: ${APP_BOT_LEAVE_REVIEW_CALLBACK_URL:http://astrbot:6198/openatom/leave-review}
  napcat:
    base-url: ${APP_NAPCAT_BASE_URL:http://napcat:3000}
    access-token: ${APP_NAPCAT_ACCESS_TOKEN:sRtnBQJy-lqPTWjj}
logging:
  level:
    cn.dev33.satoken: debug
