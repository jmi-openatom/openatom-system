  generated-document:
    storage-dir: ${APP_GENERATED_DOCUMENT_STORAGE_DIR:./uploads/generated-documents}
  ai:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
