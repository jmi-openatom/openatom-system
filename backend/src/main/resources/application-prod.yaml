spring:
  application:
    name: openatom-system
  datasource:
    # 生产 Backend 使用 host 网络，直接连接服务器本机的宝塔 MySQL
    url: jdbc:mysql://127.0.0.1:3306/openatom-db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: openatom-db
    password: 7jcAS4e8eBSbBFBt
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:openatom-prod-hikari}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
          max-wait: ${REDIS_POOL_MAX_WAIT:3000ms}
server:
  port: ${SERVER_PORT:8921}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024
  forward-headers-strategy: framework
  tomcat:
    basedir: ${TOMCAT_BASEDIR:/tmp/openatom-system}
    accesslog:
      enabled: ${TOMCAT_ACCESS_LOG_ENABLED:true}
      directory: ${TOMCAT_ACCESS_LOG_DIR:logs}
      pattern: '%h %l %u %t "%r" %s %b %D'

sa-token:
  token-name: jmiopenatom
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:d6f8a3c1e9b247a0f5d3e2b10a9c8d7e6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b10}
  timeout: ${SA_TOKEN_TIMEOUT:2592000}
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: ${SA_TOKEN_LOG_ENABLED:false}

app:
  miniapp:
    app-id: ${APP_MINIAPP_APP_ID:wx8c6b52ab95da0938}
    app-secret: ${APP_MINIAPP_APP_SECRET:d15542dcaa23b92191962235dacef7b9}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
  rate-limit:
    application-submit:
      max-per-second: ${APP_APPLICATION_SUBMIT_MAX_PER_SECOND:5}
  avatar:
    storage-dir: ${APP_AVATAR_STORAGE_DIR:./uploads/avatars}
  image-hosting:
    storage-dir: ${APP_IMAGE_HOSTING_STORAGE_DIR:./uploads/images}
  leave-attachment:
    storage-dir: ${APP_LEAVE_ATTACHMENT_STORAGE_DIR:./uploads/leave-attachments}
  bot:
    callback-token: ${APP_BOT_CALLBACK_TOKEN:}
    leave-review-callback-url: ${APP_BOT_LEAVE_REVIEW_CALLBACK_URL:http://astrbot:6198/openatom/leave-review}
  napcat:
    base-url: ${APP_NAPCAT_BASE_URL:http://napcat:3000}
    access-token: ${APP_NAPCAT_ACCESS_TOKEN:sRtnBQJy-lqPTWjj}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    edu.jmi.openatom.server.openatomsystem: ${LOG_LEVEL_APP:INFO}
  file:
    name: ${LOG_FILE:./logs/openatom-system.log}
